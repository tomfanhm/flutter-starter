name: flutter_starter
description: A production-ready Flutter starter with Clean Architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Navigation
  go_router: ^14.8.1
  # Networking
  dio: ^5.7.0
  # Data models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # Secure Storage
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Code generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
